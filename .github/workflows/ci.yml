on:
  pull_request:
  push:
    branches:
      - main
      - 'patch-release-*'

name: continuous-integration

env:
  NU_LOG_LEVEL: DEBUG
  CLIPPY_OPTIONS: "-D warnings"
  NATIVE_OPTIONS: --workspace --all-targets --exclude nu_plugin_*
  WASM_OPTIONS: >
    --no-default-features
    -p nu-cmd-base
    -p nu-cmd-extra
    -p nu-cmd-lang
    -p nu-color-config
    -p nu-command
    -p nu-derive-value
    -p nu-engine
    -p nu-glob
    -p nu-json
    -p nu-parser
    -p nu-path
    -p nu-pretty-hex
    -p nu-protocol
    -p nu-std
    -p nu-system
    -p nu-table
    -p nu-term-grid
    -p nu-utils
    -p nuon

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  cargo:
    name: "`cargo` in ${{ matrix.workspace.name }} (${{ matrix.target.name }})"
    strategy:
      fail-fast: true
      matrix:
        target:
          # Pinning to Ubuntu 22.04 because building on newer Ubuntu versions causes linux-gnu
          # builds to link against a too-new-for-many-Linux-installs glibc version. Consider
          # revisiting this when 22.04 is closer to EOL (June 2027)
          - name: Ubuntu
            host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            options: $NATIVE_OPTIONS
            steps: [fmt, clippy, test]
          - name: Windows
            host: windows-latest
            target: x86_64-pc-windows-msvc
            options: $NATIVE_OPTIONS
            steps: [fmt, clippy, test]
          - name: MacOS
            host: macos-latest
            target: x86_64-apple-darwin
            options: $NATIVE_OPTIONS
            steps: [fmt, clippy, test]
          - name: Ubuntu Plugins
            host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            options: --package nu_plugin_*
            steps: [clippy, test]
          - name: Windows Plugins
            host: windows-latest
            target: x86_64-pc-windows-msvc
            options: --package nu_plugin_*
            steps: [clippy, test]
          - name: MacOS Plugins
            host: macos-latest
            target: x86_64-apple-darwin
            options: --package nu_plugin_*
            steps: [clippy, test]
          - name: WASM
            host: ubuntu-22.04
            target: wasm32-unknown-unknown
            options: $WASM_PACKAGES
            steps: [build, check]

        workspace:
          - name: root
            path: ${{ github.workspace }}
            profile: ci
          - name: nu-parser/fuzzer
            path: ${{ github.workspace }}/crates/nu-parser/fuzzer
            profile: debug
          - name: nu-path/fuzzer
            path: ${{ github.workspace }}/crates/nu-path/fuzzer
            profile: debug

        exclude:
          - target: { name: WASM }
            workspace: { name: nu-parser/fuzzer }
          - target: { name: WASM }
            workspace: { name: nu-path/fuzzer }
          - target: { name: Ubuntu Plugins }
            workspace: { name: nu-parser/fuzzer }
          - target: { name: Ubuntu Plugins }
            workspace: { name: nu-path/fuzzer }
          - target: { name: Windows Plugins }
            workspace: { name: nu-parser/fuzzer }
          - target: { name: Windows Plugins }
            workspace: { name: nu-path/fuzzer }
          - target: { name: MacOS Plugins }
            workspace: { name: nu-parser/fuzzer }
          - target: { name: MacOS Plugins }
            workspace: { name: nu-path/fuzzer }
    
    runs-on: ${{ matrix.target.host }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Rust Toolchain and Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly # include nightly for fuzzers
          components: clippy, rustfmt # explicitly state these for fuzzers
          override: false # respect workspace rust-toolchain.toml files

      - name: cargo fmt
        run: cargo fmt --all --check
        if: contains(matrix.target.steps, 'fmt')

      - name: cargo check
        run: cargo check ${{ matrix.target.packages }} --profile ${{ matrix.workspace.profile }}
        if: contains(matrix.target.steps, 'check')

      - name: cargo clippy
        run: cargo clippy ${{ matrix.target.options }} --profile ${{ matrix.workspace.profile }} -- $CLIPPY_OPTIONS
        if: contains(matrix.target.steps, 'clippy')

      - name: cargo build
        run: cargo build ${{ matrix.target.options }} --profile ${{ matrix.workspace.profile }}
        if: contains(matrix.target.steps, 'build')

      - name: cargo test
        run: cargo test ${{ matrix.target.options }} --profile ${{ matrix.workspace.profile }}
        if: contains(matrix.target.steps, 'test')

      - name: Assert Clean Repo
        run: git diff --quiet && git diff --cached --quiet

  std-lib-and-python-virtualenv:
    strategy:
      fail-fast: true
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
        py:
          - py

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1.12.0

      - name: Install Nushell
        run: cargo install --path . --locked --force

      - name: Upload Nushell build (Ubuntu and macOS)
        uses: actions/upload-artifact@v7
        if: runner.os != 'Windows'
        with:
          name: "nu-${{ github.event.number || github.ref_name }}-${{ matrix.platform }}"
          path: "~/.cargo/bin/nu"
          retention-days: 14

      - name: Upload Nushell build (Windows)
        uses: actions/upload-artifact@v7
        if: runner.os == 'Windows'
        with:
          name: "nu-${{ github.event.number || github.ref_name }}-${{ matrix.platform }}"
          path: 'C:\Users\runneradmin\.cargo\bin\nu.exe'
          retention-days: 14

      - name: Standard library tests
        run: nu -c 'use crates/nu-std/testing.nu; testing run-tests --path crates/nu-std'

      - name: Ensure that Cargo.toml MSRV and rust-toolchain.toml use the same version
        run: nu .github/workflows/check-msrv.nu

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install virtualenv
        run: pip install virtualenv
        shell: bash

      - name: Test Nushell in virtualenv
        run: nu scripts/test_virtualenv.nu
        shell: bash

      - name: Check for clean repo
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "there are changes";
            git status --porcelain
            exit 1
          else
            echo "no changes in working directory";
          fi