[package]
authors.workspace = true
description = "Functionality for building Nushell plugins"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu-plugin"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
name = "nu-plugin"
version.workspace = true

[lib]
bench = false

[lints]
workspace = true

[dependencies]
nu-engine = { workspace = true, features = ["plugin"] }
nu-protocol = { workspace = true, features = ["plugin"] }
nu-plugin-protocol.workspace = true
nu-plugin-core.workspace = true
nu-utils.workspace = true

log = { workspace = true }
thiserror = "2.0.18"

[dev-dependencies]
serde = { workspace = true }
typetag = "0.2"

[features]
default = ["local-socket"]
local-socket = ["nu-plugin-core/local-socket"]

[target.'cfg(target_family = "unix")'.dependencies]
# For setting the process group ID (EnterForeground / LeaveForeground)
nix = { workspace = true, default-features = false, features = ["process"] }
