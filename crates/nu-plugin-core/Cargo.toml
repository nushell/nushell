[package]
authors = ["The Nushell Project Developers"]
description = "Shared internal functionality to support Nushell plugins"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu-plugin-core"
edition.workspace = true
rust-version.workspace = true
license = "MIT"
name = "nu-plugin-core"
version = "0.112.0"

[lib]
bench = false

[lints]
workspace = true

[dependencies]
nu-plugin-protocol = { path = "../nu-plugin-protocol", version = "0.112.0", default-features = false }
nu-protocol = { path = "../nu-protocol", version = "0.112.0" }
nu-utils = { path = "../nu-utils", version = "0.112.0" }

rmp-serde = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
log = { workspace = true }
interprocess = { workspace = true, optional = true }

[features]
default = ["local-socket"]
local-socket = ["interprocess", "nu-plugin-protocol/local-socket"]

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }
