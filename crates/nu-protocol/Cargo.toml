[package]
authors.workspace = true
description = "Nushell's internal protocols, including its abstract syntax tree"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu-protocol"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
name = "nu-protocol"
version.workspace = true
autotests = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
bench = false
harness = false

[[test]]
name = "tests"
path = "tests/main.rs"
harness = false

[lints]
workspace = true

[dependencies]
nu-derive-value.workspace = true
nu-glob.workspace = true
nu-path.workspace = true
nu-system.workspace = true
nu-utils.workspace = true
nu-experimental.workspace = true

brotli = { workspace = true, optional = true }
bytes = { workspace = true }
chrono = { workspace = true, features = ["serde", "std", "unstable-locales"], default-features = false }
chrono-humanize = { workspace = true }
dirs = { workspace = true }
derive_more = { workspace = true, features = ["debug"] }
fancy-regex = { workspace = true }
heck = { workspace = true }
indexmap = { workspace = true }
lru = { workspace = true }
miette = { workspace = true, features = ["fancy-no-backtrace"] }
num-format = { workspace = true }
rmp-serde = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
thiserror = { workspace = true }
typetag = "0.2"
os_pipe = { workspace = true, optional = true, features = ["io_safety"] }
log = { workspace = true }
web-time = { workspace = true }
memchr = { workspace = true }

[target.'cfg(unix)'.dependencies]
nix = { workspace = true, default-features = false, features = ["signal"] }

[target.'cfg(windows)'.dependencies]
dirs-sys = { workspace = true }
windows-sys = { workspace = true, features = ["Win32_UI_Shell"] }
windows = { workspace = true }

[features]
default = ["os"]
os = [
  "nu-utils/os",
  "os_pipe",
]

plugin = [
  "brotli",
  "os",
  "rmp-serde",
]
# enables SQLite history
sqlite = []

[dev-dependencies]
nu-test-support = { workspace = true, features = ["os"] }
nu-utils.workspace = true

serde_json = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
tempfile = { workspace = true }
os_pipe = { workspace = true }

[package.metadata.docs.rs]
all-features = true
