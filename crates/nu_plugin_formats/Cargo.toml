[package]
authors.workspace = true
description = "An I/O plugin for a set of file formats for Nushell"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu_plugin_formats"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
name = "nu_plugin_formats"
version.workspace = true
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lints]
workspace = true

[dependencies]
nu-plugin.workspace = true
nu-protocol = { workspace = true, features = ["plugin"] }

indexmap = { workspace = true }
eml-parser = "0.1"
ical = "0.11"
rust-ini = "0.21.3"
plist = "1.8"
chrono = "0.4.41" # polars is requiring <= 0.4.41

[dev-dependencies]
nu-plugin-test-support.workspace = true
