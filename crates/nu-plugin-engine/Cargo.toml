[package]
authors.workspace = true
description = "Functionality for running Nushell plugins from a Nushell engine"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu-plugin-engine"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
name = "nu-plugin-engine"
version.workspace = true

[lib]
bench = false

[lints]
workspace = true

[dependencies]
nu-engine = { workspace = true, features = ["plugin"] }
nu-protocol.workspace = true
nu-system.workspace = true
nu-plugin-protocol.workspace = true
nu-plugin-core.workspace = true
nu-utils.workspace = true

serde = { workspace = true }
log = { workspace = true }

[dev-dependencies]
typetag = "0.2"

[features]
default = ["local-socket"]
local-socket = ["nu-plugin-core/local-socket"]

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true, features = [
  # For setting process creation flags
  "Win32_System_Threading",
] }
