[package]
name = "nu-plugin-test-support"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Testing support for Nushell plugins"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu-plugin-test-support"

[lib]
bench = false

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
nu-engine = { workspace = true, features = ["plugin"] }
nu-protocol = { workspace = true, features = ["plugin"] }
nu-parser = { workspace = true, features = ["plugin"] }
nu-plugin.workspace = true
nu-plugin-core.workspace = true
nu-plugin-engine.workspace = true
nu-plugin-protocol.workspace = true
nu-cmd-lang = { workspace = true, features = ["plugin"] }
nu-ansi-term.workspace = true
similar = "3.1"

[dev-dependencies]
typetag = "0.2"
serde = "1.0"
