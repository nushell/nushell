[package]
authors.workspace = true
description = "A Nushell plugin to query JSON, XML, and various web data"
repository = "https://github.com/nushell/nushell/tree/main/crates/nu_plugin_query"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
name = "nu_plugin_query"
version.workspace = true

[lib]
doctest = false
bench = false

[[bin]]
name = "nu_plugin_query"
bench = false

[dependencies]
nu-plugin.workspace = true
nu-protocol.workspace = true

gjson = "0.8.1"
scraper = { default-features = false, version = "0.27" }
sxd-document = "0.3"
sxd-xpath = "0.4"
webpage = { version = "2.0.1", features = ["serde"] }
serde_json.workspace = true
serde.workspace = true
