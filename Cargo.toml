lru = "0.17.0"
lscolors = { version = "0.21", default-features = false }
lsp-server = "0.7.9"
lsp-types = { version = "0.97.0", features = ["proposed"] }
lsp-textdocument = "0.5.0"
linkme = "0.3.36"
mach2 = "0.6"
md5 = { version = "0.10", package = "md-5" }
miette = "7.6"
mime = "0.3.17"
mime_guess = "2.0"
mq-markdown = "0.5.26"
mockito = { version = "1.7.2", default-features = false }
multipart-rs = "0.1.13"
native-tls = "0.2.18"
nix = { version = "0.31.2", default-features = false }
notify-debouncer-full = { version = "0.3", default-features = false }
nu-ansi-term = "0.50.3"
nucleo-matcher = "0.3"
num-format = "0.4"
num-traits = "0.2"
oem_cp = "2.1.2"
omnipath = "0.1"
open = "5.3.4"
os_pipe = { version = "1.2.3", features = ["io_safety"] }
parking_lot = "0.12.5"
