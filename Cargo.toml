[workspace.lints.clippy]
# Warning: workspace lints affect library code as well as tests, so don't enable lints that would be too noisy in tests like that.
# todo = "warn"
format_push_string = "warn"
needless_raw_strings = "warn"
result_large_err = "allow"
unchecked_time_subtraction = "warn"
unwrap_used = "deny"
used_underscore_binding = "warn"

[lints]
workspace = true

[dependencies]
nu-cli = { path = "./crates/nu-cli", version = "0.112.3" }
nu-cmd-base = { path = "./crates/nu-cmd-base", version = "0.112.3" }
nu-cmd-extra = { path = "./crates/nu-cmd-extra", version = "0.112.3" }
nu-cmd-lang = { path = "./crates/nu-cmd-lang", version = "0.112.3" }
nu-cmd-plugin = { path = "./crates/nu-cmd-plugin", version = "0.112.3", optional = true }
nu-command = { path = "./crates/nu-command", version = "0.112.3", default-features = false, features = ["os"] }
nu-engine = { path = "./crates/nu-engine", version = "0.112.3" }
nu-experimental = { path = "./crates/nu-experimental", version = "0.112.3" }
nu-explore = { path = "./crates/nu-explore", version = "0.112.3" }
nu-lsp = { path = "./crates/nu-lsp/", version = "0.112.3" }
nu-parser = { path = "./crates/nu-parser", version = "0.112.3" }
nu-path = { path = "./crates/nu-path", version = "0.112.3" }
nu-plugin-engine = { path = "./crates/nu-plugin-engine", optional = true, version = "0.112.3" }
nu-protocol = { path = "./crates/nu-protocol", version = "0.112.3" }
nu-std = { path = "./crates/nu-std", version = "0.112.3" }
nu-system = { path = "./crates/nu-system", version = "0.112.3" }
nu-utils = { path = "./crates/nu-utils", version = "0.112.3" }
nu-mcp = { path = "./crates/nu-mcp", version = "0.112.3", optional = true }
reedline = { workspace = true, features = ["bashisms"] }

crossterm = { workspace = true }
ctrlc = { workspace = true }
dirs = { workspace = true }
log = { workspace = true }
lexopt = { workspace = true }
miette = { workspace = true, features = ["fancy-no-backtrace", "fancy"] }
multipart-rs = { workspace = true }
serde_json = { workspace = true }
simplelog = "0.12"
time = "0.3.47"
same-file = "1.0.6"

[target.'cfg(not(target_os = "windows"))'.dependencies]
# Our dependencies don't use OpenSSL on Windows
openssl = { version = "0.10.78", features = ["vendored"], optional = true }

[build-dependencies]
winresource = "0.1.31"

[target.'cfg(target_family = "unix")'.dependencies]
nix = { workspace = true, default-features = false, features = [
  "signal",
  "process",
  "fs",
  "term",
] }

[dev-dependencies]
nu-test-support = { path = "./crates/nu-test-support", version = "0.112.3", features = ["os"] }
nu-plugin-protocol = { path = "./crates/nu-plugin-protocol", version = "0.112.3" }
nu-plugin-core = { path = "./crates/nu-plugin-core", version = "0.112.3" }
assert_cmd = "2.2.1"
dirs = { workspace = true }
tango-bench = "0.7.2"
pretty_assertions = { workspace = true }
fancy-regex = { workspace = true }
rstest = { workspace = true, default-features = false }
tempfile = { workspace = true }

[features]
# Enable all features while still avoiding mutually exclusive features.
# Use this if `--all-features` fails.
full = [
  "network",
  "plugin",
  "rustls-tls",
  "sqlite",
  "system-clipboard",
  "trash-support",
  "mcp",
]

plugin = [
  # crates
  "dep:nu-cmd-plugin",
  "dep:nu-plugin-engine",

  # features
  "nu-cli/plugin",
  "nu-cmd-lang/plugin",
  "nu-command/plugin",
  "nu-engine/plugin",
  "nu-parser/plugin",
  "nu-protocol/plugin",
]

mcp = [
  "dep:nu-mcp",
  "nu-mcp/mcp",
]

network = ["nu-command/network"]
native-tls = ["nu-command/native-tls"]
rustls-tls = ["nu-command/rustls-tls"]

default = [
  "plugin",
  "trash-support",
  "sqlite",
  "network",
  "rustls-tls",
  "mcp",
]
stable = ["default"]
# NOTE: individual features are also passed to `nu-cmd-lang` that uses them to generate the feature matrix in the `version` command

# Enable to statically link OpenSSL (perl is required, to build OpenSSL https://docs.rs/openssl/latest/openssl/);
# otherwise the system version will be used. Not enabled by default because it takes a while to build
static-link-openssl = ["dep:openssl"]

# Optional system clipboard support in `reedline`, this behavior has problematic compatibility with some systems.
# Missing X server/ Wayland can cause issues
system-clipboard = [
  "reedline/system_clipboard",
  "nu-cli/system-clipboard",
]

# Stable (Default)
trash-support = ["nu-command/trash-support"]

# SQLite commands for nushell
sqlite = [
  "nu-cli/sqlite",
  "nu-command/sqlite",
  "nu-std/sqlite",
  "nu-protocol/sqlite",
  "reedline/sqlite",
]

[profile.release]
opt-level = "s"     # Optimize for size
strip = "debuginfo"
lto = "thin"

# build with `cargo build --profile profiling`
# to analyze performance with tooling like linux perf
[profile.profiling]
inherits = "release"
strip = false
debug = true

# build with `cargo build --profile ci`
# to analyze performance with tooling like linux perf
[profile.ci]
inherits = "dev"
strip = false
debug = false

# Main nu binary
[[bin]]
name = "nu"
path = "src/main.rs"
bench = false

# To use a development version of a dependency please use a global override here
# changing versions in each sub-crate of the workspace is tedious
[patch.crates-io]
reedline = { git = "https://github.com/nushell/reedline", branch = "main" }
# nu-ansi-term = { git = "https://github.com/nushell/nu-ansi-term.git", branch = "main" }

# Run all benchmarks with `cargo bench`
# Run individual benchmarks like `cargo bench -- <regex>` e.g. `cargo bench -- parse`
[[bench]]
name = "benchmarks"
harness = false
