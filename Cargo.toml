alphanumeric-sort = "1.5"
ansi-str = "0.9"
anyhow = "1.0.102"
base64 = "0.22.1"
bracoxide = "0.1.8"
brotli = "8.0"
byteorder = "1.5"
bytes = "1"
bytesize = "2.3.1"
byteyarn = "0.5"
calamine = "0.34"
chardetng = "0.1.17"
chrono = { default-features = false, version = "0.4.41" } # polars is requiring <= 0.4.41
chrono-humanize = "0.2.3"
chrono-tz = "0.10"
crossbeam-channel = "0.5.15"
crossterm = "0.29.0"
csv = "1.4"
ctrlc = "3.5"
derive_more = "2.1.1"
devicons = "0.6.12"
digest = { default-features = false, version = "0.10" }
dirs = "6.0"
dirs-sys = "0.5"
dns-lookup = "3.0.1"
dtparse = "2.0"
encoding_rs = "0.8"
fancy-regex = "0.17"
filesize = "0.2"
filetime = "0.2.27"
fuzzy-matcher = { version = "^0.3.7" }
gatekeeper = "3.0.0"
heck = "0.5.0"
http = "1.4.0"
human-date-parser = "0.3.1"
indexmap = "2.14.0"
indicatif = "0.18.4"
interprocess = "2.4.2"
