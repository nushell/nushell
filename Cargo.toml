[package]
authors = ["The Nushell Project Developers"]
build = "scripts/build.rs"
default-run = "nu"
description = "A new type of shell"
documentation = "https://www.nushell.sh/book/"
edition.workspace = true
exclude = ["images"]
homepage = "https://www.nushell.sh"
license = "MIT"
name = "nu"
repository = "https://github.com/nushell/nushell"
rust-version.workspace = true
version = "0.112.3"
autotests = false

[workspace.package]
edition = "2024"
rust-version = "1.93.1"

[[test]]
name = "tests"
path = "tests/main.rs"
harness = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/{ version }/{ name }-{ version }-{ target }.{ archive-format }"
pkg-fmt = "tgz"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-fmt = "zip"

[package.metadata.winresource]
LegalCopyright = "Copyright © 2019-2026 The Nushell Project Developers"
FileDescription = "A new type of shell"
FileVersion = "0.112.3"
ProductVersion = "0.112.3"
ProductName = "Nushell"

[workspace]
members = [
  "crates/nu_plugin_custom_values",
  "crates/nu_plugin_example",
  "crates/nu_plugin_formats",
  "crates/nu_plugin_gstat",
  "crates/nu_plugin_inc",
  "crates/nu_plugin_polars",
  "crates/nu_plugin_query",
  "crates/nu_plugin_stress_internals",
  "crates/nu-cli",
  "crates/nu-cmd-base",
  "crates/nu-cmd-extra",
  "crates/nu-cmd-lang",
  "crates/nu-cmd-plugin",
  "crates/nu-color-config",
  "crates/nu-command",
  "crates/nu-derive-value",
  "crates/nu-engine",
  "crates/nu-experimental",
  "crates/nu-explore",
  "crates/nu-json",
  "crates/nu-lsp",
  "crates/nu-parser",
  "crates/nu-plugin-core",
  "crates/nu-plugin-engine",
  "crates/nu-plugin-protocol",
  "crates/nu-plugin-test-support",
  "crates/nu-plugin",
  "crates/nu-pretty-hex",
  "crates/nu-protocol",
  "crates/nu-std",
  "crates/nu-system",
  "crates/nu-table",
  "crates/nu-term-grid",
  "crates/nu-test-support",
  "crates/nu-test-support-macros",
  "crates/nu-utils",
  "crates/nuon",
  "crates/nu-mcp",
]

